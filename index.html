<body class="dark:bg-gray-900">
    <div id="app"></div>
    <script>
        fetch('/app-version.json?v=' + Date.now())
            .then(response => response.json())
            .then(version => {
                window.APP_VERSION = version.version;
                
            })
            .catch(error => {
                console.error('Error fetching app version:', error);
                window.APP_VERSION = Date.now();
            });
        const v = window.APP_VERSION
        function lazy(page) {
            return () => import(`${page}.js?v=${v}`)
        }
        window.lazyLoad = lazy;
    </script>
    <script type="module" src="/src/js/main.js"></script>
    <script src="/src/js/utils/toast.js"></script>
    <button onclick="toast({
        type: 'success',
        message: 'Saved successfully!dadadadf sfdsdfsdfsdfsdfsdfsdf sfsdf',
        duration: 15000000
        })"
        class="px-4 py-2 bg-blue-600 text-white rounded">
        Show Toast
        </button>
</body>

</html>
